<!DOCTYPE html>
<html>
<head>
    <title>CarApp</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 420px;
            margin: 50px auto;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
        }

        /* Checkbox alignment */
        .checkbox-group {
            margin-top: 10px;
        }

        .checkbox-group input {
            margin-left: 5px;
        }

        /* Button */
        .submit-btn {
            width: 100%;
            padding: 10px;
            margin-top: 18px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #5a67d8;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>🚗 Welcome to CarApp</h1>

    <form method="POST" action="">
        {% csrf_token %}

        <label for="name">Name:</label>
        <input type="text" name="name" id="name" required>

        <label for="income">Income:</label>
        <input type="number" name="income" id="income" required>

        <label for="family_size">Family Size:</label>
        <input type="number" name="family_size" id="family_size" required>

        <label for="car_type">Car Type:</label>
        <input type="text" name="car_type" id="car_type" required>

        <div class="checkbox-group">
            <label for="emi_required">EMI Required:</label>
            <input type="checkbox" name="emi_required" id="emi_required">
        </div>

        <label for="location">Location:</label>
        <input type="text" name="location" id="location" required>

        <label for="usage">Usage:</label>
        <input type="text" name="usage" id="usage" required>

        <input type="submit" value="Submit" class="submit-btn">

    </form>

</div>

</body>
</html>
